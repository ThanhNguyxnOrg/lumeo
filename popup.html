<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 280px; padding: 14px; font-family: Arial, sans-serif; }
    h3 { margin: 0 0 12px; }
    button { width: 100%; padding: 10px; margin: 4px 0; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; color: #fff; }
    .start { background: #cc0000; }
    .start:hover { background: #ee0000; }
    .stop { background: #555; }
    .stop:hover { background: #777; }
    #status { margin-top: 10px; font-size: 13px; color: #555; text-align: center; }
    .info { font-size: 11px; color: #888; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>🎬 YouTube Translate & Speak</h3>
  <button id="startBtn" class="start">▶ Translate</button>
  <button id="stopBtn" class="stop">⏹ Stop</button>
  <div id="status">Ready.</div>
  <div class="info">Google Translate • Bilingual display</div>
  <script src="popup.js"></script>
</body>
</html>
