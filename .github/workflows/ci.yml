name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Validate manifest JSON
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            if (!m.name || !m.version || m.manifest_version !== 3) {
              throw new Error('manifest.json missing required MV3 fields');
            }
            console.log('manifest.json OK — name:', m.name, '· version:', m.version);
          "

      - name: Install dependencies
        run: npm ci

      - name: Validate package structure
        run: |
          set -e
          for f in content.js background.js popup.js popup.html popup.css content.css; do
            test -f "$f" || { echo "::error::missing root file $f"; exit 1; }
          done
          test -f "pack.sh" || { echo "::error::missing pack.sh"; exit 1; }
          test -f "pack.ps1" || { echo "::error::missing pack.ps1"; exit 1; }
          for f in \
            lib/audio-utils.js \
            lib/browser-api.js \
            lib/token-guard.js \
            ui/overlay.js \
            ui/subtitle-overlay.js \
            ui/voice-picker.js \
            ui/caption-fallback-choice.js \
            services/sniffer.js \
            services/audio-processor.js \
            services/captions.js \
            services/providers.js \
            services/tier-recommendation.js \
            services/translate.js \
            services/tts-browser.js \
            services/tts-openai.js \
            services/stt-soniox.js \
            services/stt-groq.js \
            services/srt-export.js \
            services/kyma-client.js \
            pipelines/caption.js \
            pipelines/caption-orchestrator.js \
            pipelines/realtime.js \
            pipelines/standard.js; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done
          for f in icons/icon-16.png icons/icon-48.png icons/icon-128.png; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done
          echo "package layout OK"

      - name: Check JavaScript syntax
        run: npm run check:all

      - name: Run unit tests
        run: npm test
